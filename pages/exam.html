<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PTIT Exam Taking Interface</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="../assets/js/tailwind.config.js"></script>
    <link href="../assets/css/style.css" rel="stylesheet" />
    <style>
        .custom-radio:checked {
            background-color: #d41c34;
            border-color: #d41c34;
        }
    </style>
</head>

<body class="bg-slate-50 text-text-main min-h-screen">
    <header
        class="sticky top-0 z-50 w-full bg-white dark:bg-slate-900 border-b border-border-light dark:border-slate-800 shadow-sm">
        <div class="max-w-[1440px] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-primary rounded flex items-center justify-center text-white">
                    <span class="material-symbols-outlined text-xl">school</span>
                </div>
                <h1 id="examTitleHeader"
                    class="text-lg font-semibold text-text-main dark:text-slate-100 truncate max-w-[400px]">
                    Đang tải bài thi...
                </h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 px-4 py-1.5 border-2 border-primary rounded-lg bg-primary/5">
                    <span class="material-symbols-outlined text-primary text-xl">timer</span>
                    <span id="examTimer" class="text-primary font-bold text-lg tabular-nums">--:--</span>
                </div>
                <button
                    class="submit-exam-btn bg-primary hover:bg-primary/90 text-white px-6 py-2 rounded-lg font-bold transition-colors shadow-md shadow-primary/20">
                    Nộp bài
                </button>
            </div>
        </div>
    </header>
    <main class="max-w-[1440px] mx-auto px-6 py-8 flex gap-8">
        <section class="w-3/4 space-y-6">
            <div id="questionContainer"
                class="bg-white dark:bg-slate-900 border border-border-light dark:border-slate-800 rounded-lg p-6 shadow-sm">
                <!-- Data fetched via JS -->
            </div>
            <div class="flex justify-between py-4">
                <button id="prevBtn"
                    class="flex items-center gap-2 px-6 py-2 border border-border-light bg-white rounded-lg font-semibold hover:bg-slate-50 transition-colors">
                    <span class="material-symbols-outlined">arrow_back</span>
                    Câu trước
                </button>
                <button id="nextBtn"
                    class="flex items-center gap-2 px-6 py-2 bg-primary text-white rounded-lg font-semibold hover:bg-primary/90 transition-colors">
                    Câu tiếp theo
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </div>
        </section>
        <aside class="w-1/4">
            <div
                class="sticky top-24 bg-white dark:bg-slate-900 border border-border-light dark:border-slate-800 rounded-lg p-6 shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-bold text-text-main dark:text-slate-100">Danh sách câu hỏi</h3>
                    <span id="answeredCount" class="text-xs text-slate-500 font-medium">Đã làm: 0/0</span>
                </div>
                <!-- Generate from Javascript via mapping -->
                <div id="questionPalette" class="grid grid-cols-5 gap-2 mb-8">
                </div>
                <div class="space-y-3 pt-4 border-t border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 bg-primary/10 border border-primary/20 rounded"></div>
                        <span class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Đã trả lời</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 bg-white border border-slate-200 rounded"></div>
                        <span class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Chưa trả lời</span>
                    </div>
                </div>
            </div>
        </aside>
    </main>
    <footer class="bg-white border-t border-slate-200 py-6 text-center mt-auto">
        <p class="text-slate-500 text-sm font-medium">2026 Quiz Web PTIT</p>
    </footer>

    <!-- Confirm Submit Modal -->
    <div id="confirmSubmitModal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm transition-opacity opacity-0"
            id="confirmSubmitOverlay"></div>

        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-sm bg-white dark:bg-slate-900 rounded-xl shadow-2xl p-6 text-center scale-95 opacity-0 transition-all duration-300"
            id="confirmSubmitContent">
            <div
                class="w-16 h-16 rounded-full bg-amber-100 dark:bg-amber-500/20 text-amber-500 mx-auto flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-3xl">info</span>
            </div>
            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Xác nhận nộp bài</h3>
            <p id="confirmSubmitMessage"
                class="text-sm text-slate-500 dark:text-slate-400 border-b border-slate-100 dark:border-slate-800 pb-6 mb-6">
                Bạn có chắc chắn muốn nộp bài?
            </p>

            <div class="flex gap-3">
                <button type="button" id="cancelSubmitBtn"
                    class="flex-1 py-2.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-semibold text-sm rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    Hủy
                </button>
                <button type="button" id="confirmSubmitBtn"
                    class="flex-1 py-2.5 bg-primary text-white font-semibold text-sm rounded-lg hover:bg-primary/90 shadow-md shadow-primary/20 transition-colors">
                    Nộp bài
                </button>
            </div>
        </div>
    </div>

    <script src="../assets/js/exam.js"></script>
</body>

</html>
