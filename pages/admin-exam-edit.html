<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="../assets/js/tailwind.config.js"></script>
    <link href="../assets/css/style.css" rel="stylesheet" />
</head>

<body class="bg-slate-50 font-display text-slate-900">
    <div class="flex min-h-screen">
        <!-- Sidebar Navigation -->
        <aside
            class="w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col fixed h-full z-50">
            <div class="p-6 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
                    <span class="material-symbols-outlined">school</span>
                </div>
                <div>
                    <h1 class="text-sm font-bold uppercase tracking-wider text-primary">Quiz PTIT</h1>
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium">Hệ thống quản lý thi</p>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-2 mt-4">
                <a class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/10 text-primary font-semibold transition-colors"
                    href="admin-dashboard.html">
                    <span class="material-symbols-outlined">description</span>
                    <span class="text-sm">Quản lý Kỳ thi</span>
                </a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                    href="admin-students.html">
                    <span class="material-symbols-outlined">group</span>
                    <span class="text-sm">Quản lý Sinh viên</span>
                </a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                    href="admin-statistics.html">
                    <span class="material-symbols-outlined">bar_chart</span>
                    <span class="text-sm">Thống kê &amp; Báo cáo</span>
                </a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                    href="#">
                    <span class="material-symbols-outlined">settings</span>
                    <span class="text-sm">Cài đặt</span>
                </a>
            </nav>
            <div class="p-6 border-t border-slate-100 dark:border-slate-800">
                <div class="flex items-center gap-3 p-2">
                    <div class="size-10 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden">
                        <img class="w-full h-full object-cover" data-alt="Avatar of the admin profile user"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuDH9UHGo00do-EHvn5gX1EkE7zWGP1ocqZ2y7THbqAkzV4K_uPatHeJdiOeYTi_A-4z7AHVuNir01SqAfhkkzZF1_nhQ1jfnY0K5eNaUMQK2hhVxgXi_-D3XqMKXFLm6o_zcCSzeaKRazF_jShiKHn0bloX5WYRaEwh8-LVSGBlIbWY408W9Epd12FnG5ZmMY1IA2CCdFpUqhysZK3zBUxQ7fY_T2arCr4nRZZRE3i6SwviqBHh61-TKCGGzDTDXv_4-nGKvhz4dki6" />
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-slate-500 dark:text-slate-400 truncate">Administrator</p>
                    </div>
                    <a href="login.html"><span
                            class="material-symbols-outlined text-slate-400 hover:text-primary transition-colors cursor-pointer">logout</span></a>
                </div>
            </div>
        </aside>
        <!-- Main Content Area -->
        <main class="flex-1 ml-72 p-8">
            <!-- Top Header Bar -->
            <header class="flex items-center justify-between mb-8 max-w-5xl mx-auto">
                <div class="flex items-center gap-4">
                    <div class="p-2 bg-primary/10 text-primary rounded-lg">
                        <span class="material-symbols-outlined">add_circle</span>
                    </div>
                    <h2 class="text-2xl font-bold tracking-tight">Tạo kỳ thi mới</h2>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="window.location.href='admin-dashboard.html'"
                        class="px-6 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 font-semibold text-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                        Hủy
                    </button>
                    <button id="saveExamBtnTop"
                        class="px-6 py-2.5 rounded-lg bg-primary text-white font-semibold text-sm hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">save</span>
                        Lưu kỳ thi
                    </button>
                </div>
            </header>
            <div class="max-w-5xl mx-auto space-y-8">
                <!-- Section 1: General Info Card -->
                <section
                    class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">info</span>
                        <h3 class="font-bold text-lg">Thông tin chung</h3>
                    </div>
                    <div class="p-8">
                        <div class="grid grid-cols-2 gap-6 mb-6">
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Tên kỳ
                                    thi</label>
                                <input id="examTitle"
                                    class="w-full rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary transition-all p-3"
                                    placeholder="" type="text" />
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Loại kỳ
                                    thi</label>
                                <select id="examType"
                                    class="w-full rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary transition-all p-3">
                                    <option value="">Chọn loại kỳ thi</option>
                                    <option value="giua-ky">Giữa kỳ</option>
                                    <option value="cuoi-ky">Cuối kỳ</option>
                                    <option value="luyen-tap">Luyện Tập</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Thời gian làm
                                    bài</label>
                                <div class="relative">
                                    <input id="examDuration"
                                        class="w-full rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary transition-all p-3 pr-12"
                                        placeholder="" type="number" />
                                    <span
                                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium">phút</span>
                                </div>
                            </div>
                            <div class="space-y-4 col-span-2 pt-4 border-t border-slate-100 dark:border-slate-800 mt-2">
                                <div class="flex items-center justify-between">
                                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Thời gian mở
                                        Quiz</label>
                                    <label
                                        class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 p-1.5 -mr-1.5 rounded-lg transition-colors">
                                        <input id="examIsPermanent"
                                            class="w-4 h-4 rounded text-primary border-slate-300 focus:ring-primary"
                                            type="checkbox"
                                            onchange="const inputs = this.closest('.space-y-4').querySelectorAll('input[type=datetime-local]'); inputs.forEach(i => { i.disabled = this.checked; if (this.checked) i.classList.add('bg-slate-100', 'cursor-not-allowed', 'opacity-60'); else i.classList.remove('bg-slate-100', 'cursor-not-allowed', 'opacity-60'); })" />
                                        <span
                                            class="text-sm text-slate-600 dark:text-slate-400 font-medium select-none">Mở
                                            vĩnh viễn</span>
                                    </label>
                                </div>
                                <div class="grid grid-cols-2 gap-6">
                                    <div class="space-y-2">
                                        <span class="text-xs font-medium text-slate-500">Bắt đầu lúc</span>
                                        <input id="examStartTime"
                                            class="w-full rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary transition-all p-3 text-sm text-slate-700 dark:text-slate-300"
                                            type="datetime-local" />
                                    </div>
                                    <div class="space-y-2">
                                        <span class="text-xs font-medium text-slate-500">Kết thúc lúc</span>
                                        <input id="examEndTime"
                                            class="w-full rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary transition-all p-3 text-sm text-slate-700 dark:text-slate-300"
                                            type="datetime-local" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <!-- Section 2: Questions List Card -->
                <section
                    class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
                    <div
                        class="px-6 py-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary">quiz</span>
                            <h3 class="font-bold text-lg">Danh sách câu hỏi</h3>
                        </div>
                        <div class="flex gap-3">
                            <button
                                class="flex items-center gap-2 px-4 py-2 border border-primary text-primary font-bold text-sm rounded-lg hover:bg-primary/5 transition-colors">
                                <span class="material-symbols-outlined text-[18px]">upload_file</span>
                                Import Excel
                            </button>
                        </div>
                    </div>
                    <div class="p-6 space-y-6" id="questionsContainer">
                        <!-- Questions will be injected dynamically here -->

                        <!-- Add Button -->
                        <button id="addQuestionBtn"
                            class="w-full py-4 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl flex items-center justify-center gap-2 text-slate-500 hover:text-primary hover:border-primary/50 transition-all font-medium">
                            <span class="material-symbols-outlined">add_circle</span>
                            Thêm câu hỏi tiếp theo
                        </button>
                    </div>
                </section>
                <!-- Footer Info -->
                <div class="flex items-center justify-between pb-12">
                    <p class="text-sm text-slate-500 italic flex items-center gap-1"> </p>
                    <div class="flex gap-4">
                        <button onclick="window.location.href='admin-dashboard.html'"
                            class="px-8 py-3 rounded-xl border border-slate-300 dark:border-slate-700 font-bold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                            Hủy
                        </button>
                        <button id="saveExamBtnBottom"
                            class="px-8 py-3 rounded-xl bg-primary text-white font-bold hover:bg-primary/90 shadow-xl shadow-primary/20 transition-all">
                            Lưu kỳ thi &amp; Xuất bản
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Custom Alert Modal -->
    <div id="customAlertModal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm custom-alert-close transition-opacity opacity-0"
            id="customAlertModalOverlay"></div>

        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-sm bg-white dark:bg-slate-900 rounded-xl shadow-2xl p-6 text-center scale-95 opacity-0 transition-all duration-300"
            id="customAlertModalContent">
            <div
                class="w-16 h-16 rounded-full bg-amber-100 dark:bg-amber-500/20 text-amber-500 mx-auto flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-3xl">info</span>
            </div>
            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Thông báo</h3>
            <p id="customAlertMessage"
                class="text-sm text-slate-500 dark:text-slate-400 border-b border-slate-100 dark:border-slate-800 pb-6 mb-6">
                <!-- Nội dung thông báo -->
            </p>

            <button type="button"
                class="custom-alert-close w-full py-2.5 bg-primary text-white font-semibold text-sm rounded-lg hover:bg-primary/90 shadow-md shadow-primary/20 transition-all">
                Đã hiểu
            </button>
        </div>
    </div>

    <script src="../assets/js/admin-exam-builder.js"></script>
</body>

</html>
