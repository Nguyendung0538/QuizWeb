<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Quiz Web PTIT - Đăng nhập</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <link href="../assets/css/style.css" rel="stylesheet" />
</head>

<body class="font-display bg-white min-h-screen flex flex-col">
    <div class="relative flex h-auto min-h-screen w-full flex-col bg-white group/design-root overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <header
                class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-100 px-10 py-4">
                <div class="flex items-center gap-3 text-primary">
                    <div class="text-primary">
                        <span class="material-symbols-outlined text-3xl">school</span>
                    </div>
                    <h2 class="text-primary text-xl font-bold leading-tight tracking-tight">Quiz Web PTIT</h2>
                </div>
            </header>
            <main class="flex flex-1 items-center justify-center p-6 bg-slate-50">
                <div
                    class="w-full max-w-[480px] bg-white rounded-xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
                    <div class="flex border-b border-slate-100">
                        <button
                            class="flex-1 py-4 text-center text-sm font-bold text-primary border-b-2 border-primary">
                            Đăng nhập
                        </button>
                        <button onclick="window.location.href='register.html'"
                            class="flex-1 py-4 text-center text-sm font-semibold text-slate-400 hover:text-slate-600 transition-colors">
                            Đăng ký
                        </button>
                    </div>
                    <div class="p-8">
                        <div class="mb-8">
                            <h1 class="text-2xl font-bold text-slate-900">Đăng nhập tài khoản</h1>
                        </div>
                        <form id="loginForm" class="space-y-5">
                            <div class="space-y-2">
                                <label class="text-slate-700 text-sm font-semibold flex items-center gap-2">
                                    <span class="material-symbols-outlined text-sm">person</span>
                                    Email đăng nhập
                                </label>
                                <input id="usernameInput"
                                    class="w-full h-12 px-4 rounded-lg border border-[#CBD5E1] focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400"
                                    placeholder="Email" type="text" />
                                <p id="usernameError" class="text-red-500 text-xs mt-1 hidden">Vui lòng nhập Email đăng
                                    nhập</p>
                            </div>
                            <div class="space-y-2">
                                <div class="flex justify-between items-center">
                                    <label class="text-slate-700 text-sm font-semibold flex items-center gap-2">
                                        <span class="material-symbols-outlined text-sm">lock</span>
                                        Mật khẩu
                                    </label>
                                    <a id="forgotPasswordLink"
                                        class="text-primary text-xs font-medium hover:underline cursor-pointer">Quên mật
                                        khẩu?</a>
                                </div>
                                <div class="relative">
                                    <input id="passwordInput"
                                        class="w-full h-12 px-4 rounded-lg border border-[#CBD5E1] focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 pr-12"
                                        placeholder="••••••••" type="password" />
                                    <button id="togglePasswordBtn"
                                        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
                                        type="button">
                                        <span class="material-symbols-outlined text-[20px]">visibility</span>
                                    </button>
                                </div>
                                <p id="passwordError" class="text-red-500 text-xs mt-1 hidden">Vui lòng nhập mật khẩu
                                </p>
                            </div>
                            <div class="flex items-center gap-2 pt-1">
                                <input
                                    class="w-4 h-4 text-primary border-[#CBD5E1] rounded focus:ring-primary outline-none"
                                    id="remember" type="checkbox" />
                                <label class="text-slate-600 text-sm cursor-pointer" for="remember">Ghi nhớ đăng
                                    nhập</label>
                            </div>
                            <div class="pt-2">
                                <button
                                    class="w-full h-12 bg-primary hover:bg-red-700 text-white font-bold rounded-lg transition-colors shadow-md shadow-primary/20 flex items-center justify-center gap-2"
                                    type="submit">
                                    Đăng nhập
                                    <span class="material-symbols-outlined text-lg">login</span>
                                </button>
                            </div>
                        </form>
                    </div>
                    <div class="px-8 pb-8 text-center">
                        <p class="text-sm text-slate-500">
                            Chưa có tài khoản?
                            <a class="text-primary font-bold hover:underline" href="register.html">Đăng ký ngay</a>
                        </p>
                    </div>
                </div>
            </main>
            <footer class="bg-white border-t border-slate-200 py-6 text-center mt-auto">
                <p class="text-slate-500 text-sm font-medium">2026 Quiz Web PTIT</p>
            </footer>
        </div>
    </div>

    <!-- Forgot Password Modal (Dog Alo Alo) -->
    <div id="forgotPasswordModal" class="fixed inset-0 z-[100] hidden items-center justify-center">
        <!-- Overlay -->
        <div id="forgotPasswordOverlay"
            class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity opacity-0"></div>

        <!-- Modal Content -->
        <div id="forgotPasswordContent"
            class="relative bg-white rounded-2xl shadow-xl w-[90%] max-w-sm overflow-hidden transform scale-95 opacity-0 transition-all duration-300">

            <div class="p-6 text-center">
                <!-- Close Button -->
                <button id="closeForgotBtn"
                    class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>

                <div class="mt-4 mb-6">
                    <span class="material-symbols-outlined text-amber-500 text-5xl mb-2">lock_reset</span>
                    <h3 class="text-xl font-bold text-slate-800">Cấp lại mật khẩu</h3>
                </div>

                <!-- Dog Image -->
                <div class="bg-slate-50 rounded-xl overflow-hidden mb-6 mx-auto border-4 border-slate-100 p-2">
                    <img src="../assets/img/dog-alo-alo.png" alt="Dog Alo Alo"
                        class="w-full h-auto object-contain max-h-56" />
                </div>

                <p class="text-sm text-slate-700 font-semibold mb-2">
                    Vui lòng liên hệ Admin để xin cấp lại mật khẩu mới.
                </p>
                <p class="text-sm text-primary font-bold">Xin cảm ơn!</p>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="../assets/js/login.js"></script>
</body>

</html>
