<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d41c34",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211113",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="flex min-h-screen">
        <!-- Sidebar Navigation -->
        <aside
            class="w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col fixed h-full z-50">
            <div class="p-6 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
                    <span class="material-symbols-outlined">school</span>
                </div>
                <div>
                    <h1 class="text-sm font-bold uppercase tracking-wider text-primary">Quiz PTIT</h1>
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium">Hệ thống quản lý thi</p>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-2 mt-4">
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
                    href="#">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span class="text-sm font-medium">Bảng điều khiển</span>
                </a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg bg-primary/10 text-primary" href="#">
                    <span class="material-symbols-outlined">description</span>
                    <span class="text-sm font-bold">Quản lý kỳ thi</span>
                </a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
                    href="#">
                    <span class="material-symbols-outlined">database</span>
                    <span class="text-sm font-medium">Ngân hàng câu hỏi</span>
                </a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
                    href="#">
                    <span class="material-symbols-outlined">group</span>
                    <span class="text-sm font-medium">Sinh viên</span>
                </a>
            </nav>
            <div class="p-4 border-t border-slate-200 dark:border-slate-800">
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
                    href="#">
                    <span class="material-symbols-outlined">settings</span>
                    <span class="text-sm font-medium">Cài đặt</span>
                </a>
            </div>
        </aside>
        <!-- Main Content Area -->
        <main class="flex-1 ml-64 p-8">
            <!-- Top Header Bar -->
            <header class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-4">
                    <div class="p-2 bg-primary/10 text-primary rounded-lg">
                        <span class="material-symbols-outlined">add_circle</span>
                    </div>
                    <h2 class="text-2xl font-bold tracking-tight">Tạo kỳ thi mới</h2>
                </div>
                <div class="flex items-center gap-3">
                    <button
                        class="px-6 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 font-semibold text-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                        Hủy
                    </button>
                    <button
                        class="px-6 py-2.5 rounded-lg bg-primary text-white font-semibold text-sm hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">save</span>
                        Lưu kỳ thi
                    </button>
                </div>
            </header>
            <div class="max-w-5xl space-y-8">
                <!-- Section 1: General Info Card -->
                <section
                    class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">info</span>
                        <h3 class="font-bold text-lg">Thông tin chung</h3>
                    </div>
                    <div class="p-8">
                        <div class="grid grid-cols-2 gap-6 mb-6">
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Tên kỳ
                                    thi</label>
                                <input
                                    class="w-full rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary transition-all p-3"
                                    placeholder="Ví dụ: Kiểm tra giữa kỳ Lập trình Web - Nhóm 01" type="text" />
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Loại kỳ
                                    thi</label>
                                <select
                                    class="w-full rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary transition-all p-3">
                                    <option value="">Chọn loại kỳ thi</option>
                                    <option value="giua-ky">Giữa kỳ</option>
                                    <option value="cuoi-ky">Cuối kỳ</option>
                                    <option value="thuc-hanh">Thực hành</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Thời gian làm
                                    bài</label>
                                <div class="relative">
                                    <input
                                        class="w-full rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary transition-all p-3 pr-12"
                                        placeholder="60" type="number" />
                                    <span
                                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium">phút</span>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Học kỳ</label>
                                <select
                                    class="w-full rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary transition-all p-3">
                                    <option value="hk1">Học kỳ 1 - 2023-2024</option>
                                    <option value="hk2">Học kỳ 2 - 2023-2024</option>
                                    <option value="hk3">Học kỳ hè</option>
                                </select>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Mô tả kỳ thi</label>
                            <textarea
                                class="w-full rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary transition-all p-3 min-h-[100px]"
                                placeholder="Nhập mô tả hoặc hướng dẫn cho sinh viên..."></textarea>
                        </div>
                    </div>
                </section>
                <!-- Section 2: Questions List Card -->
                <section
                    class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
                    <div
                        class="px-6 py-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary">quiz</span>
                            <h3 class="font-bold text-lg">Danh sách câu hỏi</h3>
                        </div>
                        <div class="flex gap-3">
                            <button
                                class="flex items-center gap-2 px-4 py-2 border border-primary text-primary font-bold text-sm rounded-lg hover:bg-primary/5 transition-colors">
                                <span class="material-symbols-outlined text-[18px]">upload_file</span>
                                Import Excel
                            </button>
                            <button
                                class="flex items-center gap-2 px-4 py-2 bg-primary text-white font-bold text-sm rounded-lg hover:bg-primary/90 transition-colors">
                                <span class="material-symbols-outlined text-[18px]">add</span>
                                Thêm câu hỏi thủ công
                            </button>
                        </div>
                    </div>
                    <div class="p-6 space-y-6">
                        <!-- Question Block 1 -->
                        <div
                            class="p-6 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/30 relative group">
                            <button class="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                            <div class="flex items-center gap-3 mb-6">
                                <span
                                    class="flex items-center justify-center w-8 h-8 rounded-full bg-primary text-white text-xs font-bold">1</span>
                                <input
                                    class="flex-1 bg-transparent border-b border-slate-300 dark:border-slate-700 focus:border-primary focus:ring-0 transition-all font-semibold py-1 px-0"
                                    placeholder="Nhập nội dung câu hỏi số 1..." type="text" />
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <!-- Option A -->
                                <div class="flex items-center gap-3 group/option">
                                    <input
                                        class="w-5 h-5 text-primary focus:ring-primary border-slate-300 dark:bg-slate-950"
                                        name="correct_q1" type="radio" />
                                    <div class="relative flex-1">
                                        <span
                                            class="absolute left-3 top-1/2 -translate-y-1/2 font-bold text-primary text-xs">A</span>
                                        <input
                                            class="w-full pl-8 py-2 rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary"
                                            placeholder="Phương án A" type="text" />
                                    </div>
                                </div>
                                <!-- Option B -->
                                <div class="flex items-center gap-3 group/option">
                                    <input
                                        class="w-5 h-5 text-primary focus:ring-primary border-slate-300 dark:bg-slate-950"
                                        name="correct_q1" type="radio" />
                                    <div class="relative flex-1">
                                        <span
                                            class="absolute left-3 top-1/2 -translate-y-1/2 font-bold text-primary text-xs">B</span>
                                        <input
                                            class="w-full pl-8 py-2 rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary"
                                            placeholder="Phương án B" type="text" />
                                    </div>
                                </div>
                                <!-- Option C -->
                                <div class="flex items-center gap-3 group/option">
                                    <input
                                        class="w-5 h-5 text-primary focus:ring-primary border-slate-300 dark:bg-slate-950"
                                        name="correct_q1" type="radio" />
                                    <div class="relative flex-1">
                                        <span
                                            class="absolute left-3 top-1/2 -translate-y-1/2 font-bold text-primary text-xs">C</span>
                                        <input
                                            class="w-full pl-8 py-2 rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary"
                                            placeholder="Phương án C" type="text" />
                                    </div>
                                </div>
                                <!-- Option D -->
                                <div class="flex items-center gap-3 group/option">
                                    <input
                                        class="w-5 h-5 text-primary focus:ring-primary border-slate-300 dark:bg-slate-950"
                                        name="correct_q1" type="radio" />
                                    <div class="relative flex-1">
                                        <span
                                            class="absolute left-3 top-1/2 -translate-y-1/2 font-bold text-primary text-xs">D</span>
                                        <input
                                            class="w-full pl-8 py-2 rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:border-primary focus:ring-primary"
                                            placeholder="Phương án D" type="text" />
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Question Block 2 (Empty Placeholder Example) -->
                        <div
                            class="p-6 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 relative">
                            <button class="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                            <div class="flex items-center gap-3 mb-6">
                                <span
                                    class="flex items-center justify-center w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-bold">2</span>
                                <input
                                    class="flex-1 bg-transparent border-b border-slate-200 dark:border-slate-800 focus:border-primary focus:ring-0 transition-all font-semibold py-1 px-0"
                                    placeholder="Nhập nội dung câu hỏi số 2..." type="text" />
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="flex items-center gap-3">
                                    <input
                                        class="w-5 h-5 text-primary focus:ring-primary border-slate-300 dark:bg-slate-950"
                                        name="correct_q2" type="radio" />
                                    <div class="relative flex-1">
                                        <span
                                            class="absolute left-3 top-1/2 -translate-y-1/2 font-bold text-primary text-xs">A</span>
                                        <input
                                            class="w-full pl-8 py-2 rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950"
                                            placeholder="Phương án A" type="text" />
                                    </div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <input
                                        class="w-5 h-5 text-primary focus:ring-primary border-slate-300 dark:bg-slate-950"
                                        name="correct_q2" type="radio" />
                                    <div class="relative flex-1">
                                        <span
                                            class="absolute left-3 top-1/2 -translate-y-1/2 font-bold text-primary text-xs">B</span>
                                        <input
                                            class="w-full pl-8 py-2 rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950"
                                            placeholder="Phương án B" type="text" />
                                    </div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <input
                                        class="w-5 h-5 text-primary focus:ring-primary border-slate-300 dark:bg-slate-950"
                                        name="correct_q2" type="radio" />
                                    <div class="relative flex-1">
                                        <span
                                            class="absolute left-3 top-1/2 -translate-y-1/2 font-bold text-primary text-xs">C</span>
                                        <input
                                            class="w-full pl-8 py-2 rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950"
                                            placeholder="Phương án C" type="text" />
                                    </div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <input
                                        class="w-5 h-5 text-primary focus:ring-primary border-slate-300 dark:bg-slate-950"
                                        name="correct_q2" type="radio" />
                                    <div class="relative flex-1">
                                        <span
                                            class="absolute left-3 top-1/2 -translate-y-1/2 font-bold text-primary text-xs">D</span>
                                        <input
                                            class="w-full pl-8 py-2 rounded-lg border-slate-200 dark:border-slate-800 dark:bg-slate-950"
                                            placeholder="Phương án D" type="text" />
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Add Button -->
                        <button
                            class="w-full py-4 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl flex items-center justify-center gap-2 text-slate-500 hover:text-primary hover:border-primary/50 transition-all font-medium">
                            <span class="material-symbols-outlined">add_circle</span>
                            Thêm câu hỏi tiếp theo
                        </button>
                    </div>
                </section>
                <!-- Footer Info -->
                <div class="flex items-center justify-between pb-12">
                    <p class="text-sm text-slate-500 italic flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">schedule</span>
                        Tự động lưu lúc 10:45 AM
                    </p>
                    <div class="flex gap-4">
                        <button
                            class="px-8 py-3 rounded-xl border border-slate-300 dark:border-slate-700 font-bold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                            Hủy
                        </button>
                        <button
                            class="px-8 py-3 rounded-xl bg-primary text-white font-bold hover:bg-primary/90 shadow-xl shadow-primary/20 transition-all">
                            Lưu kỳ thi &amp; Xuất bản
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
